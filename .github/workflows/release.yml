name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  QT_VERSION: '6.9.2'
  APP_NAME:   'DailyHexPuzzle'

# ────────────────────────────────────────────────────────────────────────────
jobs:

  # ── Windows x64 (MSVC) ──────────────────────────────────────────────────
  windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt (MSVC 2022)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host:    windows
          target:  desktop
          arch:    win64_msvc2022_64
          cache:   true

      - name: Generate app.ico
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass `
            -File qt-client/gen_icon.ps1 -OutDir qt-client

      - name: Configure
        run: |
          cmake -S qt-client -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Deploy Qt runtime
        run: |
          $deploy = "deploy"
          New-Item $deploy -ItemType Directory | Out-Null
          # exe and custom DLL (POST_BUILD copies DLL next to exe)
          Copy-Item "build\Release\${{ env.APP_NAME }}.exe" $deploy\
          $dll = Get-ChildItem "build\Release" -Filter "*hex_solver*.dll" |
                   Select-Object -First 1
          if ($dll) { Copy-Item $dll.FullName $deploy\ }
          windeployqt6 --release --no-translations --dir $deploy `
            "$deploy\${{ env.APP_NAME }}.exe"

      - name: Package
        run: Compress-Archive deploy "${{ env.APP_NAME }}-windows-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: ${{ env.APP_NAME }}-windows-x64.zip

  # ── Linux x86_64 AppImage ───────────────────────────────────────────────
  linux-x64:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt (aqt)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host:    linux
          target:  desktop
          arch:    linux_gcc_64
          cache:   true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libglib2.0-dev \
            libfuse2 patchelf
          pip3 install Pillow

      - name: Generate icon PNG
        run: python3 qt-client/gen_icon.py 256 ${{ env.APP_NAME }}.png

      - name: Configure & build
        run: |
          cmake -S qt-client -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"
          cmake --build build --parallel

      - name: Download linuxdeploy
        run: |
          base="https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous"
          bqt="https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous"
          wget -q -O linuxdeploy           "$base/linuxdeploy-x86_64.AppImage"
          wget -q -O linuxdeploy-plugin-qt "$bqt/linuxdeploy-plugin-qt-x86_64.AppImage"
          chmod +x linuxdeploy linuxdeploy-plugin-qt

      - name: Create AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
          QMAKE: ${{ env.QT_ROOT_DIR }}/bin/qmake
        run: |
          cat > ${{ env.APP_NAME }}.desktop <<'EOF'
          [Desktop Entry]
          Name=${{ env.APP_NAME }}
          Exec=${{ env.APP_NAME }}
          Icon=${{ env.APP_NAME }}
          Type=Application
          Categories=Game;
          EOF

          ./linuxdeploy \
            --appdir AppDir \
            --executable build/${{ env.APP_NAME }} \
            --library build/solver-ffi/libhex_solver.so \
            --desktop-file ${{ env.APP_NAME }}.desktop \
            --icon-file    ${{ env.APP_NAME }}.png \
            --plugin qt \
            --output appimage

          mv ${{ env.APP_NAME }}-*.AppImage ${{ env.APP_NAME }}-linux-x64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: ${{ env.APP_NAME }}-linux-x64.AppImage

  # ── Linux ARM64 AppImage ─────────────────────────────────────────────────
  linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt and dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            qt6-base-dev qt6-tools-dev cmake ninja-build \
            libgl1-mesa-dev libglib2.0-dev \
            libfuse2 patchelf
          pip3 install Pillow

      - name: Generate icon PNG
        run: python3 qt-client/gen_icon.py 256 ${{ env.APP_NAME }}.png

      - name: Configure & build
        run: |
          QT_PREFIX=$(qmake6 -query QT_INSTALL_PREFIX)
          cmake -S qt-client -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_PREFIX"
          cmake --build build --parallel

      - name: Download linuxdeploy (aarch64)
        run: |
          base="https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous"
          bqt="https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous"
          wget -q -O linuxdeploy           "$base/linuxdeploy-aarch64.AppImage"
          wget -q -O linuxdeploy-plugin-qt "$bqt/linuxdeploy-plugin-qt-aarch64.AppImage"
          chmod +x linuxdeploy linuxdeploy-plugin-qt

      - name: Create AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          export QMAKE=$(which qmake6)

          cat > ${{ env.APP_NAME }}.desktop <<'EOF'
          [Desktop Entry]
          Name=${{ env.APP_NAME }}
          Exec=${{ env.APP_NAME }}
          Icon=${{ env.APP_NAME }}
          Type=Application
          Categories=Game;
          EOF

          ./linuxdeploy \
            --appdir AppDir \
            --executable build/${{ env.APP_NAME }} \
            --library build/solver-ffi/libhex_solver.so \
            --desktop-file ${{ env.APP_NAME }}.desktop \
            --icon-file    ${{ env.APP_NAME }}.png \
            --plugin qt \
            --output appimage

          mv ${{ env.APP_NAME }}-*.AppImage ${{ env.APP_NAME }}-linux-arm64.AppImage

      - uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: ${{ env.APP_NAME }}-linux-arm64.AppImage

  # ── Android arm64-v8a APK ────────────────────────────────────────────────
  android-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Android NDK / build-tools / platform
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses \
            > /dev/null 2>&1 || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.2.12479018" "build-tools;36.0.0" "platforms;android-36"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Install Qt 6.11.1 (Android arm64-v8a + host)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.1'
          host:    linux
          target:  android
          arch:    android_arm64_v8a
          extra:   '--autodesktop'
          cache:   true

      - name: Set Qt host path
        run: echo "QT_HOST_PATH=$(dirname $QT_ROOT_DIR)/gcc_64" >> $GITHUB_ENV

      - name: Prepare signing keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.jks
          cat > signing.properties << EOF
          storeFile=${{ github.workspace }}/release.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASS }}
          keyAlias=${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEYSTORE_PASS }}
          EOF
          echo "ANDROID_SIGNING_PROPERTIES=${{ github.workspace }}/signing.properties" \
            >> $GITHUB_ENV

      - name: Configure (Release)
        run: |
          cmake -S android-client -B build-android \
            -G Ninja \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_NDK="$ANDROID_NDK_ROOT" \
            -DANDROID_PLATFORM=android-28 \
            -DANDROID_SDK_ROOT="$ANDROID_SDK_ROOT" \
            -DANDROID_STL=c++_shared \
            -DANDROID_USE_LEGACY_TOOLCHAIN_FILE=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake" \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR" \
            -DCMAKE_FIND_ROOT_PATH="$QT_ROOT_DIR" \
            -DQT_HOST_PATH="$QT_HOST_PATH" \
            -DQT_NO_GLOBAL_APK_TARGET_PART_OF_ALL=ON \
            -DQT_USE_TARGET_ANDROID_BUILD_DIR=ON

      - name: Build signed APK
        run: cmake --build build-android --target apk --parallel

      - name: Rename APK
        run: |
          mv build-android/android-build-DailyHexPuzzleAndroid/build/outputs/apk/release/android-build-DailyHexPuzzleAndroid-release.apk \
             ${{ env.APP_NAME }}-android-arm64.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-arm64
          path: ${{ env.APP_NAME }}-android-arm64.apk

  # ── GitHub Release ───────────────────────────────────────────────────────
  release:
    needs: [windows-x64, linux-x64, linux-arm64, android-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ env.APP_NAME }}-windows-x64.zip
            ${{ env.APP_NAME }}-linux-x64.AppImage
            ${{ env.APP_NAME }}-linux-arm64.AppImage
            ${{ env.APP_NAME }}-android-arm64.apk
